{% extends "base.html" %}
{% load static %}

{% block content %}

<h2>Edit Budget Row</h2>
<form action="" method="POST" class="form">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Submit</button>
  <a href="{% url 'budget' %}?month={{ row.month.slug }}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock content %}
